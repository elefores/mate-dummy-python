name: Keep Up

# Runs MATE (Keep Up) via the published action to scan for outdated dependencies
# and open upgrade PRs. This repo dogfoods the default OpenCode agent — it needs
# no [agent] section in kup.toml, just a provider key. Required repository secrets:
#   ACCESS_TOKEN       - GitHub token used to push branches and open PRs
#   KUP_LICENSE_KEY    - signed keepup license key (the tool refuses to run without it)
#   ANTHROPIC_API_KEY  - provider key for the OpenCode agent
#
# The built-in GITHUB_TOKEN is also forwarded as the release-notes API token to
# lift the GitHub API rate limit (60 -> 5000 requests/hour); no extra secret needed.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays at 06:00 UTC
  workflow_dispatch:

jobs:
  keepup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: elefores/mate-keep-up-action@v1
        with:
          access-token: ${{ secrets.ACCESS_TOKEN }}
          license-key: ${{ secrets.KUP_LICENSE_KEY }}
          agent: opencode
          model: anthropic/claude-sonnet-4
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-api-token: ${{ secrets.GITHUB_TOKEN }}
