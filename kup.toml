# keepup (MATE / Keep Up) configuration.
#
# Sections below exercise the main config surface: include / ignore filters
# (languages, paths, dependencies) and grouping thresholds. The AI agent is left
# unset, so the default OpenCode agent is used — it is selected from the keepup
# workflow (.github/workflows/keepup.yml), no [agent] section required.

[include]
# Only look at this project's Python sources.
languages = ["python"]
paths = ["src/**"]

[ignore]
# The test pins move on their own cadence — leave them out of automated PRs.
paths = ["tests/**"]
dependencies = ["pytest"]

[thresholds]
# Open one PR per dependency file; group a folder's worth once it crosses 3.
file = 1
folder = 3
